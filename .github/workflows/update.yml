# Auto-updates the predictor's data. Runs every 30 minutes during game hours
# (roughly 10:00 AM – 11:30 PM Eastern) and can be triggered by hand from the
# Actions tab ("Run workflow" button).
#
# After the season ends (Aug 10, 2026), disable this workflow:
# GitHub -> Actions -> "Update FCBL data" -> "..." menu -> Disable workflow.

name: Update FCBL data

on:
  workflow_dispatch: {}
  schedule:
    # GitHub cron is UTC. The league plays in EDT (UTC-4), so:
    # 14:00–23:30 UTC = 10:00 AM–7:30 PM ET, 00:00–03:30 UTC = 8:00–11:30 PM ET.
    - cron: "*/30 14-23 * * *"
    - cron: "*/30 0-3 * * *"

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests (safety check)
        run: npm test

      - name: Scrape and re-simulate
        run: npm run scrape

      - name: Commit updated data (only if something changed)
        run: |
          git config user.name "fcbl-predictor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data/
          if git diff --quiet --cached; then
            echo "No data changes, nothing to commit."
          else
            git commit -m "data: auto-update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
