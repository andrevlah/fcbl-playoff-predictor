# Best-effort auto-update of the predictor's data.
#
# IMPORTANT (July 2026): the league site added CloudFront bot protection that
# blocks automated scraping, so most of these runs will "skip" (they finish
# green but change nothing). That is expected, not a failure. The reliable way
# to keep the site current is to record final scores by hand with
# `npm run enter` (see the README). This job stays around, at a light cadence,
# only to catch up automatically if the league ever drops the bot block.
#
# After the season ends (Aug 10, 2026), disable this workflow:
# GitHub -> Actions -> "Update FCBL data" -> "..." menu -> Disable workflow.

name: Update FCBL data

on:
  workflow_dispatch: {}
  schedule:
    # A few times a day (UTC) instead of every 30 min, so we're not hammering
    # the site's bot protection. Late morning, afternoon, and late evening ET.
    - cron: "0 15 * * *"   # ~11:00 AM ET
    - cron: "0 20 * * *"   # ~4:00 PM ET
    - cron: "30 2 * * *"   # ~10:30 PM ET (post-game)

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests (safety check)
        run: npm test

      - name: Scrape and re-simulate
        run: npm run scrape

      - name: Commit updated data (only if something changed)
        run: |
          git config user.name "fcbl-predictor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data/
          if git diff --quiet --cached; then
            echo "No data changes, nothing to commit."
          else
            git commit -m "data: auto-update $(date -u '+%Y-%m-%d %H:%M UTC')"
            # another run may have pushed while we scraped; rebase our data
            # commit on top rather than failing the push
            git pull --rebase origin main
            git push
          fi
